<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Admin - Starium Rafa QC</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #00BCD4;
            --primary-dark: #0097A7;
            --success: #00E676;
            --danger: #F44336;
            --warning: #FF9800;
            --bg-dark: #121212;
            --bg-card: #1E1E1E;
            --bg-card-hover: #252525;
            --text: #ffffff;
            --text-muted: #888;
            --border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, var(--bg-card) 0%, #2d2d2d 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-card);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 100;
        }

        .back-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: var(--bg-card-hover);
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--bg-dark);
            border-color: var(--primary);
        }

        /* Content Panels */
        .panel {
            background: var(--bg-card);
            border-radius: 0 10px 10px 10px;
            padding: 20px;
            display: none;
        }

        .panel.active {
            display: block;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
