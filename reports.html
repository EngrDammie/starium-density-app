<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Starium Rafa QC</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-storage.js"></script>
    <style>
        :root {
            --primary: #00BCD4;
            --primary-dark: #0097A7;
            --success: #00E676;
            --danger: #F44336;
            --warning: #FF9800;
            --bg-dark: #121212;
            --bg-card: #1E1E1E;
            --text: #ffffff;
            --text-muted: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, var(--bg-card) 0%, #2d2d2d 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-card);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 100;
        }

        .back-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .quick-template-btn {
            display: block;
            width: 100%;
            padding: 20px 25px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #252525 100%);
            border: 2px solid var(--primary);
            border-radius: 12px;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
        }

        .quick-template-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 188, 212, 0.4);
        }

        .quick-template-btn .btn-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .quick-template-btn:hover .btn-title {
            color: var(--bg-dark);
        }

        .quick-template-btn .btn-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .quick-template-btn:hover .btn-subtitle {
            color: var(--bg-dark);
        }

        .filters-section {
            display: none;
        }

        .filters-section.active {
            display: block;
        }

        .filters-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 2px solid #444;
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .generate-btn {
            padding: 12px 30px;
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .generate-btn:hover {
            background: var(--success);
        }

        .generate-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        /* Report Output */
        .report-output {
            display: none;
        }

        .report-output.active {
            display: block;
        }

        .report-header {
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fff;
            color: #000;
        }

        .report-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #000;
        }

        .report-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .report-meta-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .report-meta-item .label {
            font-weight: bold;
            color: #333;
        }

        .report-meta-item .value {
            color: #000;
        }

        .approvers-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #333;
        }

        .approvers-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #000;
        }

        .approvers-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
        }

        .approver-item {
            font-size: 0.85rem;
            color: #333;
        }

        /* Charts */
        .charts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-container {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
        }

        .chart-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            color: #000;
        }

        /* Table */
        .table-container {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            color: #000;
        }

        .data-table th {
            background: #333;
            color: #fff;
            padding: 12px 8px;
            text-align: left;
            font-weight: bold;
            border: 1px solid #555;
        }

        .data-table td {
            padding: 10px 8px;
            border: 1px solid #ddd;
            color: #000;
        }

        .data-table tr:nth-child(even) {
            background: #f5f5f5;
        }

        .data-table tr:hover {
            background: #e0e0e0;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-badge.normal {
            background: #00E676;
            color: #000;
        }

        .status-badge.low {
            background: #FF9800;
            color: #000;
        }

        .status-badge.high {
            background: #F44336;
            color: #fff;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            background-color: var(--bg-card);
            border-top: 1px solid #333;
            margin-top: 20px;
            border-radius: 10px;
            position: relative;
        }

        footer p {
            color: #666;
            font-size: 0.9rem;
            cursor: default;
            transition: all 0.3s ease;
        }

        footer:hover p {
            opacity: 0;
        }

        footer::before {
            content: "Starium Rafa Quality Control Tool | Reports";
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            color: #666;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        footer:hover::before {
            opacity: 0;
        }

        footer::after {
            content: "WhatsApp Dammie Optimus Solutions on 07053331253";
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            color: var(--primary);
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        footer:hover::after {
            opacity: 1;
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .back-btn,
            .panel:first-child,
            .filters-row,
            .generate-btn,
            footer {
                display: none !important;
            }

            .report-output {
                display: block !important;
            }

            .report-header {
                border: 2px solid #000;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .charts-section {
                grid-template-columns: 1fr 1fr;
                page-break-inside: avoid;
            }

            .chart-container {
                border: 1px solid #ccc;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .data-table th {
                background: #333 !important;
                color: #fff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .data-table td {
                color: #000 !important;
            }

            .status-badge.normal {
                background: #00E676 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .status-badge.low {
                background: #FF9800 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .status-badge.high {
                background: #F44336 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .charts-section {
                grid-template-columns: 1fr;
            }

            .filters-row {
                flex-direction: column;
            }

            .report-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to App</a>

    <header>
        <h1>📊 Reports</h1>
        <p class="subtitle">Generate and print QC test reports</p>
    </header>

    <div class="container">
        <!-- Quick Templates -->
        <div class="panel">
            <button class="quick-template-btn" onclick="showFilters()">
                <div class="btn-title">📋 QC Density Tests Report</div>
                <div class="btn-subtitle">This report will allow you to query the different shifts (day or night) and the different modes (level 9 or bot) for any day</div>
            </button>
        </div>

        <!-- Filters -->
        <div class="panel filters-section" id="filtersSection">
            <div class="filters-row">
                <div class="filter-group">
                    <label for="reportDate">📅 Date</label>
                    <input type="date" id="reportDate">
                </div>
                <div class="filter-group">
                    <label for="reportMode">🔧 Mode</label>
                    <select id="reportMode">
                        <option value="level9">Level 9 Silo Densities</option>
                        <option value="bot">BOT Densities</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="reportShift">🌙 Shift</label>
                    <select id="reportShift">
                        <option value="DAY">DAY</option>
                        <option value="NIGHT">NIGHT</option>
                    </select>
                </div>
                <div class="filter-group" style="display: flex; align-items: flex-end;">
                    <button class="generate-btn" onclick="generateReport()">Generate Report</button>
                </div>
            </div>
        </div>

        <!-- Report Output -->
        <div class="report-output" id="reportOutput">
            <!-- Report Header -->
            <div class="report-header" id="reportHeader"></div>

            <!-- Charts -->
            <div class="charts-section" id="chartsSection">
                <div class="chart-container">
                    <div class="chart-title">📈 Density Trend</div>
                    <canvas id="densityTrendChart"></canvas>
                </div>
                <div class="chart-container">
                    <div class="chart-title">🥧 High/Low Distribution</div>
                    <canvas id="distributionChart"></canvas>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table class="data-table" id="reportTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <footer>
            <p>Starium Rafa Quality Control Tool | Reports</p>
        </footer>
    </div>

    <script>
        // Set default date to today
        document.getElementById('reportDate').valueAsDate = new Date();

        let densityChart = null;
        let distributionChart = null;
        let currentReportData = [];

        function showFilters() {
            document.getElementById('filtersSection').classList.add('active');
            document.getElementById('reportOutput').classList.remove('active');
        }

        async function generateReport() {
            const date = document.getElementById('reportDate').value;
            const mode = document.getElementById('reportMode').value;
            const shift = document.getElementById('reportShift').value;

            if (!date) {
                alert('Please select a date');
                return;
            }

            const reportOutput = document.getElementById('reportOutput');
            reportOutput.classList.add('active');

            // Show loading in table area, keep header/charts structure
            const reportHeader = document.getElementById('reportHeader');
            const chartsSection = document.getElementById('chartsSection');
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');

            reportHeader.innerHTML = '<div class="loading"><div class="spinner"></div>Loading report...</div>';
            chartsSection.style.display = 'none';
            tableHead.innerHTML = '';
            tableBody.innerHTML = '<tr><td colspan="9"><div class="loading"><div class="spinner"></div>Generating report...</div></td></tr>';

            try {
                // Get shift approval document
                const approval = await getShiftApprovalByDate(mode, shift, date);
                
                // Get tests for this shift
                let tests = [];
                if (approval && approval.id) {
                    tests = await getTestsByApprovalDoc(approval.id, 1000);
                }

                // Sort by time
                tests.sort((a, b) => {
                    const dateA = a.createdAt ? (a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt)) : new Date(0);
                    const dateB = b.createdAt ? (b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt)) : new Date(0);
                    return dateA - dateB;
                });

                currentReportData = tests;
                
                // Build report
                renderReportHeader(approval, mode, shift, date, tests);
                renderCharts(tests, mode);
                renderTable(tests, mode);

            } catch (error) {
                console.error('Error generating report:', error);
                const reportHeader = document.getElementById('reportHeader');
                const tableBody = document.getElementById('tableBody');
                reportHeader.innerHTML = '';
                tableBody.innerHTML = '<tr><td colspan="9" class="no-data">Error generating report. Please try again.</td></tr>';
            }
        }

        async function getShiftApprovalByDate(mode, shift, dateStr) {
            const db = window.db;
            try {
                const snapshot = await db.collection('shift_approvals')
                    .where('mode', '==', mode)
                    .where('shift', '==', shift)
                    .where('date', '==', dateStr)
                    .limit(1)
                    .get();
                
                if (snapshot.empty) return null;
                
                const doc = snapshot.docs[0];
                return { id: doc.id, ...doc.data() };
            } catch (e) {
                console.error('Error getting shift approval:', e);
                return null;
            }
        }

        function renderReportHeader(approval, mode, shift, date, tests) {
            const header = document.getElementById('reportHeader');
            const modeLabel = mode === 'level9' ? 'Level 9 Silo Densities' : 'BOT Densities';
            const title = mode === 'level9' ? 'Level 9 Powder Density Tests' : 'BOT Powder Density Tests';
            
            // Get unique QC staff
            const uniqueStaff = [...new Set(tests.map(t => t.qcName).filter(n => n))];
            const uniqueTeams = [...new Set(tests.map(t => t.team).filter(t => t))];

            let approversHTML = '';
            const approverFields = mode === 'level9' 
                ? ['buggySupervisor', 'plcOperator', 'productionManager', 'qcManager', 'qcSupervisor']
                : ['plcOperator', 'productionManager', 'qcManager', 'qcSupervisor'];
            
            approverFields.forEach(field => {
                const approver = approval?.[field];
                if (approver?.name) {
                    const label = field.replace(/([A-Z])/g, ' $1').trim();
                    approversHTML += `<div class="approver-item">• ${label}: ${approver.name}</div>`;
                }
            });

            header.innerHTML = `
                <div class="report-title">${title}</div>
                <div class="report-meta">
                    <div class="report-meta-item">
                        <span class="label">Mode:</span>
                        <span class="value">${modeLabel}</span>
                    </div>
                    <div class="report-meta-item">
                        <span class="label">Shift:</span>
                        <span class="value">${shift}</span>
                    </div>
                    <div class="report-meta-item">
                        <span class="label">Date:</span>
                        <span class="value">${formatDate(date)}</span>
                    </div>
                    <div class="report-meta-item">
                        <span class="label">Total Tests:</span>
                        <span class="value">${tests.length}</span>
                    </div>
                    <div class="report-meta-item">
                        <span class="label">QC Staff:</span>
                        <span class="value">${uniqueStaff.join(', ') || 'N/A'}</span>
                    </div>
                    <div class="report-meta-item">
                        <span class="label">Team:</span>
                        <span class="value">${uniqueTeams.join(', ') || 'N/A'}</span>
                    </div>
                </div>
                ${approversHTML ? `
                    <div class="approvers-section">
                        <div class="approvers-title">Shift Approvers:</div>
                        <div class="approvers-list">${approversHTML}</div>
                    </div>
                ` : ''}
            `;
        }

        function renderCharts(tests, mode) {
            // Destroy existing charts
            if (densityChart) densityChart.destroy();
            if (distributionChart) distributionChart.destroy();

            const densityCtx = document.getElementById('densityTrendChart').getContext('2d');
            const distributionCtx = document.getElementById('distributionChart').getContext('2d');

            // Get density thresholds based on mode
            const config = getConfig();
            const minDensity = mode === 'bot' ? config.botMinDensity : config.level9MinDensity;
            const maxDensity = mode === 'bot' ? config.botMaxDensity : config.level9MaxDensity;

            // Prepare data for density trend
            const sortedTests = [...tests].sort((a, b) => {
                const dateA = a.createdAt ? (a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt)) : new Date(0);
                const dateB = b.createdAt ? (b.createdAt.toDate ? b.createdAt.toDate() : new Date(b.createdAt)) : new Date(0);
                return dateA - dateB;
            });

            const densityData = sortedTests.map(t => parseFloat(t.density) || 0);
            const labels = densityData.map((_, i) => `Test ${i + 1}`);

            // Calculate y-axis bounds
            let chartYMin = minDensity - 0.02;
            let chartYMax = maxDensity + 0.02;
            if (densityData.length > 0) {
                const actualMin = Math.min(...densityData);
                const actualMax = Math.max(...densityData);
                chartYMin = Math.min(chartYMin, actualMin - 0.01);
                chartYMax = Math.max(chartYMax, actualMax + 0.01);
            }

            // Density Trend Line Chart
            densityChart = new Chart(densityCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Density (g/mL)',
                        data: densityData,
                        borderColor: '#00BCD4',
                        backgroundColor: 'rgba(0, 188, 212, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#00BCD4',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            min: chartYMin,
                            max: chartYMax,
                            ticks: { callback: v => v.toFixed(3) }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            // High/Low Distribution (doughnut)
            let normalCount = 0, lowCount = 0, highCount = 0;
            
            sortedTests.forEach(test => {
                const d = parseFloat(test.density) || 0;
                if (d < minDensity) lowCount++;
                else if (d > maxDensity) highCount++;
                else normalCount++;
            });

            distributionChart = new Chart(distributionCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Normal', 'Low', 'High'],
                    datasets: [{
                        data: [normalCount, lowCount, highCount],
                        backgroundColor: ['#00E676', '#FF9800', '#F44336'],
                        borderColor: ['#1E1E1E', '#1E1E1E', '#1E1E1E'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#000' }
                        }
                    }
                }
            });
        }

        function renderTable(tests, mode) {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');

            if (tests.length === 0) {
                document.getElementById('chartsSection').style.display = 'none';
                tbody.innerHTML = '<tr><td colspan="9" class="no-data">No tests found for this shift</td></tr>';
                return;
            }

            document.getElementById('chartsSection').style.display = 'grid';

            // Build table header
            let columns = [];
            if (mode === 'level9') {
                columns = [
                    { key: 'time', label: 'Time' },
                    { key: 'weight', label: 'Weight (g)' },
                    { key: 'density', label: 'Density' },
                    { key: 'status', label: 'Status' },
                    { key: 'buggy', label: 'Buggy' },
                    { key: 'machines', label: 'Machines' },
                    { key: 'appearance', label: 'Appearance' },
                    { key: 'fragrance', label: 'Fragrance' },
                    { key: 'remarks', label: 'Remarks' }
                ];
            } else {
                columns = [
                    { key: 'time', label: 'Time' },
                    { key: 'weight', label: 'Weight (g)' },
                    { key: 'density', label: 'Density' },
                    { key: 'status', label: 'Status' },
                    { key: 'appearance', label: 'Appearance' },
                    { key: 'flowProperty', label: 'Flow' },
                    { key: 'remarks', label: 'Remarks' }
                ];
            }

            thead.innerHTML = '<tr>' + columns.map(c => `<th>${c.label}</th>`).join('') + '</tr>';

            // Build table body
            const config = getConfig();
            const minDensity = mode === 'bot' ? config.botMinDensity : config.level9MinDensity;
            const maxDensity = mode === 'bot' ? config.botMaxDensity : config.level9MaxDensity;

            tbody.innerHTML = tests.map(test => {
                const density = parseFloat(test.density) || 0;
                let status, statusClass;
                if (density < minDensity) { status = 'Low'; statusClass = 'low'; }
                else if (density > maxDensity) { status = 'High'; statusClass = 'high'; }
                else { status = 'Normal'; statusClass = 'normal'; }

                const time = test.createdAt 
                    ? (test.createdAt.toDate ? test.createdAt.toDate() : new Date(test.createdAt)).toLocaleTimeString()
                    : '--';

                let rowData = {
                    time: time,
                    weight: test.weight || '--',
                    density: density.toFixed(3),
                    status: `<span class="status-badge ${statusClass}">${status}</span>`,
                    appearance: test.appearance === 'A' ? 'A' : (test.appearance === 'U' ? 'U' : '--'),
                    buggy: test.buggyNumber || '--',
                    machines: (test.machines || []).join(', '),
                    fragrance: test.fragrance === 'A' ? 'A' : (test.fragrance === 'U' ? 'U' : '--'),
                    flowProperty: test.flowProperty === 'FF' ? 'A' : (test.flowProperty === 'NFF' ? 'U' : '--'),
                    remarks: test.remarks || '--'
                };

                if (mode === 'level9') {
                    return `<tr>
                        <td>${rowData.time}</td>
                        <td>${rowData.weight}</td>
                        <td>${rowData.density}</td>
                        <td>${rowData.status}</td>
                        <td>${rowData.buggy}</td>
                        <td>${rowData.machines}</td>
                        <td>${rowData.appearance}</td>
                        <td>${rowData.fragrance}</td>
                        <td>${rowData.remarks}</td>
                    </tr>`;
                } else {
                    return `<tr>
                        <td>${rowData.time}</td>
                        <td>${rowData.weight}</td>
                        <td>${rowData.density}</td>
                        <td>${rowData.status}</td>
                        <td>${rowData.appearance}</td>
                        <td>${rowData.flowProperty}</td>
                        <td>${rowData.remarks}</td>
                    </tr>`;
                }
            }).join('');
        }

        function formatDate(dateStr) {
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return `${parts[2]}/${parts[1]}/${parts[0]}`;
            }
            return dateStr;
        }

        // Auth check
        firebase.auth().onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
