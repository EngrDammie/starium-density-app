<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Change Password - Starium Rafa Quality Control Tool</title>
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
 <script src="firebase-storage.js"></script>
 <style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 }

 body {
 background-color: #0a0a0a;
 color: #ffffff;
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 }

 .container {
 background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
 padding: 40px 50px;
 border-radius: 15px;
 border: 2px solid #FF6B00;
 box-shadow: 0 0 30px rgba(255, 107, 0, 0.3);
 max-width: 450px;
 width: 90%;
 animation: fadeIn 0.5s ease-out;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(-20px); }
 to { opacity: 1; transform: translateY(0); }
 }

 h1 {
 color: #FF6B00;
 font-size: 1.5rem;
 margin-bottom: 5px;
 text-transform: uppercase;
 letter-spacing: 2px;
 text-align: center;
 }

 .subtitle {
 color: #888;
 text-align: center;
 margin-bottom: 30px;
 font-size: 0.9rem;
 }

 .user-info {
 background: rgba(255, 107, 0, 0.1);
 border: 1px solid #FF6B00;
 padding: 12px;
 border-radius: 8px;
 margin-bottom: 25px;
 text-align: center;
 color: #FF6B00;
 font-size: 0.9rem;
 }

 .form-group {
 margin-bottom: 20px;
 }

 .form-group label {
 display: block;
 color: #FF6B00;
 font-weight: bold;
 margin-bottom: 8px;
 font-size: 0.9rem;
 }

 .form-group input {
 width: 100%;
 padding: 12px 15px;
 background-color: #1a1a1a;
 color: #ffffff;
 border: 2px solid #333;
 border-radius: 8px;
 font-size: 1rem;
 outline: none;
 transition: all 0.3s ease;
 }

 .form-group input::placeholder {
 color: #666;
 }

 .form-group input:focus {
 border-color: #FF6B00;
 box-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
 }

 .password-requirements {
 background: rgba(255, 107, 0, 0.05);
 border-left: 3px solid #FF6B00;
 padding: 12px 15px;
 margin-bottom: 20px;
 border-radius: 0 8px 8px 0;
 }

 .password-requirements h4 {
 color: #FF6B00;
 font-size: 0.85rem;
 margin-bottom: 8px;
 }

 .password-requirements ul {
 list-style: none;
 padding: 0;
 }

 .password-requirements li {
 color: #888;
 font-size: 0.8rem;
 margin-bottom: 4px;
 padding-left: 15px;
 position: relative;
 }

 .password-requirements li::before {
 content: '•';
 color: #FF6B00;
 position: absolute;
 left: 0;
 }

 .submit-btn {
 width: 100%;
 padding: 14px;
 background: linear-gradient(135deg, #FF6B00 0%, #e55a00 100%);
 color: #ffffff;
 border: none;
 border-radius: 8px;
 font-size: 1rem;
 font-weight: bold;
 text-transform: uppercase;
 cursor: pointer;
 transition: all 0.3s ease;
 margin-top: 10px;
 }

 .submit-btn:hover {
 background: linear-gradient(135deg, #ff7a1a 0%, #FF6B00 100%);
 box-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
 transform: translateY(-2px);
 }

 .submit-btn:disabled {
 background: #444;
 cursor: not-allowed;
 transform: none;
 box-shadow: none;
 }

 .error-message {
 color: #ff4444;
 background-color: rgba(255, 68, 68, 0.1);
 border: 1px solid #ff4444;
 padding: 12px;
 border-radius: 8px;
 margin-bottom: 20px;
 text-align: center;
 display: none;
 animation: shake 0.5s ease;
 }

 @keyframes shake {
 0%, 100% { transform: translateX(0); }
 25% { transform: translateX(-10px); }
 75% { transform: translateX(10px); }
 }

 .success-message {
 color: #00c853;
 background-color: rgba(0, 200, 83, 0.1);
 border: 1px solid #00c853;
 padding: 12px;
 border-radius: 8px;
 margin-bottom: 20px;
 text-align: center;
 display: none;
 animation: fadeIn 0.5s ease;
 }

 .back-link {
 text-align: center;
 margin-top: 25px;
 }

 .back-link a {
 color: #888;
 text-decoration: none;
 font-size: 0.9rem;
 transition: color 0.3s ease;
 }

 .back-link a:hover {
 color: #FF6B00;
 }

 .loading-overlay {
 display: none;
 position: fixed;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 background: rgba(0, 0, 0, 0.8);
 z-index: 1000;
 justify-content: center;
 align-items: center;
 flex-direction: column;
 }

 .loading-overlay.active {
 display: flex;
 }

 .spinner {
 width: 50px;
 height: 50px;
 border: 4px solid #333;
 border-top: 4px solid #FF6B00;
 border-radius: 50%;
 animation: spin 1s linear infinite;
 }

 @keyframes spin {
 0% { transform: rotate(0deg); }
 100% { transform: rotate(360deg); }
 }

 .loading-text {
 color: #FF6B00;
 margin-top: 15px;
 font-size: 1rem;
 }
 </style>
</head>

<body>
 <div class="container">
 <h1>Change Password</h1>
 <p class="subtitle">Update your account password</p>
 
 <div id="userInfo" class="user-info"></div>
 
 <div id="errorMessage" class="error-message"></div>
 <div id="successMessage" class="success-message"></div>
 
 <form id="changePasswordForm">
 <div class="form-group">
 <label for="currentPassword">Current Password</label>
 <input type="password" id="currentPassword" placeholder="Enter your current password" required>
 </div>
 
 <div class="form-group">
 <label for="newPassword">New Password</label>
 <input type="password" id="newPassword" placeholder="Enter new password" required>
 </div>
 
 <div class="form-group">
 <label for="confirmPassword">Confirm New Password</label>
 <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
 </div>
 
 <div class="password-requirements">
 <h4>Password Requirements:</h4>
 <ul>
 <li>Minimum 6 characters</li>
 <li>New password must differ from current</li>
 </ul>
 </div>
 
 <button type="submit" class="submit-btn" id="changeBtn">Change Password</button>
 </form>
 
 <div class="back-link">
 <a href="index.html">← Back to App</a>
 </div>
 </div>

 <!-- Loading Overlay -->
 <div class="loading-overlay" id="loadingOverlay">
 <div class="spinner"></div>
 <div class="loading-text" id="loadingText">Processing...</div>
 </div>

 <script>
 // Firebase Configuration
 const firebaseConfig = {
 apiKey: "AIzaSyBO3Yrns0NibOzcM5EVUdQ62Std95ltZBk",
 authDomain: "starium-rafa-app.firebaseapp.com",
 projectId: "starium-rafa-app",
 storageBucket: "starium-rafa-app.firebasestorage.app",
 messagingSenderId: "743583982928",
 appId: "1:743583982928:web:e331aaa0b9e741a1537855"
 };

 // Initialize Firebase
 firebase.initializeApp(firebaseConfig);
 const auth = firebase.auth();

 // DOM Elements
 const changePasswordForm = document.getElementById('changePasswordForm');
 const currentPasswordInput = document.getElementById('currentPassword');
 const newPasswordInput = document.getElementById('newPassword');
 const confirmPasswordInput = document.getElementById('confirmPassword');
 const changeBtn = document.getElementById('changeBtn');
 const errorMessage = document.getElementById('errorMessage');
 const successMessage = document.getElementById('successMessage');
 const userInfo = document.getElementById('userInfo');
 const loadingOverlay = document.getElementById('loadingOverlay');
 const loadingText = document.getElementById('loadingText');

 // Check if user is logged in - wait for Auth to fully initialize
 let authCheckComplete = false;
 
 auth.onAuthStateChanged((user) => {
 // Ignore the initial null state that happens before Firebase initializes
 if (!authCheckComplete) {
 authCheckComplete = true;
 return;
 }
 
 if (!user) {
 // User not logged in, redirect to login
 window.location.href = 'login.html';
 } else {
 userInfo.textContent = `Changing password for: ${user.email}`;
 }
 });
 
 // Fallback: also check currentUser after a short delay
 setTimeout(() => {
 if (!auth.currentUser) {
 window.location.href = 'login.html';
 } else {
 userInfo.textContent = `Changing password for: ${auth.currentUser.email}`;
 }
 }, 500);

 // Show error message
 function showError(message) {
 errorMessage.textContent = message;
 errorMessage.style.display = 'block';
 successMessage.style.display = 'none';
 }

 // Hide error message
 function hideError() {
 errorMessage.style.display = 'none';
 }

 // Show success message
 function showSuccess(message) {
 successMessage.textContent = message;
 successMessage.style.display = 'block';
 errorMessage.style.display = 'none';
 }

 // Show loading
 function showLoading(text) {
 loadingText.textContent = text;
 loadingOverlay.classList.add('active');
 }

 // Hide loading
 function hideLoading() {
 loadingOverlay.classList.remove('active');
 }

 // Handle form submission
 changePasswordForm.addEventListener('submit', async (e) => {
 e.preventDefault();
 hideError();
 
 const currentPassword = currentPasswordInput.value;
 const newPassword = newPasswordInput.value;
 const confirmPassword = confirmPasswordInput.value;
 
 // Validation
 if (!currentPassword || !newPassword || !confirmPassword) {
 showError('Please fill in all fields.');
 return;
 }
 
 if (newPassword.length < 6) {
 showError('New password must be at least 6 characters.');
 return;
 }
 
 if (newPassword !== confirmPassword) {
 showError('New passwords do not match.');
 return;
 }
 
 if (currentPassword === newPassword) {
 showError('New password must be different from current password.');
 return;
 }
 
 changeBtn.disabled = true;
 changeBtn.textContent = 'Changing...';
 
 try {
 const user = auth.currentUser;
 if (!user) {
 showError('No user logged in. Please log in again.');
 changeBtn.disabled = false;
 changeBtn.textContent = 'Change Password';
 return;
 }
 
 // Re-authenticate user with current password
 showLoading('Re-authenticating...');
 const credential = firebase.auth.EmailAuthProvider.credential(
 user.email,
 currentPassword
 );
 
 await user.reauthenticateWithCredential(credential);
 
 // Update password
 loadingText.textContent = 'Updating password...';
 await user.updatePassword(newPassword);
 
 hideLoading();
 showSuccess('Password changed successfully! Redirecting to login...');
 
 // Clear form
 currentPasswordInput.value = '';
 newPasswordInput.value = '';
 confirmPasswordInput.value = '';
 
 // Sign out and redirect to login after 2 seconds
 setTimeout(async () => {
 await auth.signOut();
 window.location.href = 'login.html';
 }, 2000);
 
 } catch (error) {
 hideLoading();
 changeBtn.disabled = false;
 changeBtn.textContent = 'Change Password';
 
 let errorMsg = 'Failed to change password. Please try again.';
 
 switch (error.code) {
 case 'auth/invalid-email':
 errorMsg = 'Invalid email address format.';
 break;
 case 'auth/wrong-password':
 errorMsg = 'Current password is incorrect.';
 break;
 case 'auth/weak-password':
 errorMsg = 'New password is too weak. Use at least 6 characters.';
 break;
 case 'auth/requires-recent-login':
 errorMsg = 'Please log out and log in again to change your password.';
 break;
 case 'auth/too-many-requests':
 errorMsg = 'Too many requests. Please try again later.';
 break;
 case 'auth/network-request-failed':
 errorMsg = 'Network error. Please check your connection.';
 break;
 case 'auth/user-mismatch':
 errorMsg = 'User mismatch. Please log in again.';
 break;
 }
 
 showError(errorMsg);
 }
 });
 </script>
</body>

</html>
