<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Login - Starium Rafa Quality Control Tool</title>
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
 <style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 }

 body {
 background-color: #0a0a0a;
 color: #ffffff;
 min-height: 100vh;
 display: flex;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 }

 .login-container {
 background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
 padding: 40px 50px;
 border-radius: 15px;
 border: 2px solid #FF6B00;
 box-shadow: 0 0 30px rgba(255, 107, 0, 0.3);
 max-width: 400px;
 width: 90%;
 animation: fadeIn 0.5s ease-out;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(-20px); }
 to { opacity: 1; transform: translateY(0); }
 }

 h1 {
 color: #FF6B00;
 font-size: 1.8rem;
 margin-bottom: 10px;
 text-transform: uppercase;
 letter-spacing: 2px;
 text-align: center;
 }

 .subtitle {
 color: #888;
 text-align: center;
 margin-bottom: 30px;
 font-size: 0.9rem;
 }

 .form-group {
 margin-bottom: 20px;
 }

 .form-group label {
 display: block;
 color: #FF6B00;
 font-weight: bold;
 margin-bottom: 8px;
 font-size: 0.9rem;
 }

 .form-group input {
 width: 100%;
 padding: 12px 15px;
 background-color: #1a1a1a;
 color: #ffffff;
 border: 2px solid #333;
 border-radius: 8px;
 font-size: 1rem;
 outline: none;
 transition: all 0.3s ease;
 }

 .form-group input::placeholder {
 color: #666;
 }

 .form-group input:focus {
 border-color: #FF6B00;
 box-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
 }

 .login-btn {
 width: 100%;
 padding: 14px;
 background: linear-gradient(135deg, #FF6B00 0%, #e55a00 100%);
 color: #ffffff;
 border: none;
 border-radius: 8px;
 font-size: 1rem;
 font-weight: bold;
 text-transform: uppercase;
 cursor: pointer;
 transition: all 0.3s ease;
 margin-top: 10px;
 }

 .login-btn:hover {
 background: linear-gradient(135deg, #ff7a1a 0%, #FF6B00 100%);
 box-shadow: 0 0 20px rgba(255, 107, 0, 0.5);
 transform: translateY(-2px);
 }

 .login-btn:disabled {
 background: #444;
 cursor: not-allowed;
 transform: none;
 box-shadow: none;
 }

 .error-message {
 color: #ff4444;
 background-color: rgba(255, 68, 68, 0.1);
 border: 1px solid #ff4444;
 padding: 12px;
 border-radius: 8px;
 margin-bottom: 20px;
 text-align: center;
 display: none;
 animation: shake 0.5s ease;
 }

 @keyframes shake {
 0%, 100% { transform: translateX(0); }
 25% { transform: translateX(-10px); }
 75% { transform: translateX(10px); }
 }

 .back-link {
 text-align: center;
 margin-top: 20px;
 }

 .back-link a {
 color: #888;
 text-decoration: none;
 font-size: 0.9rem;
 transition: color 0.3s ease;
 }

 .back-link a:hover {
 color: #FF6B00;
 }
 </style>
</head>

<body>
 <div class="login-container">
 <h1>Starium Rafa</h1>
 <p class="subtitle">Quality Control Tool</p>
 
 <div id="errorMessage" class="error-message"></div>
 
 <form id="loginForm">
 <div class="form-group">
 <label for="email">Email Address</label>
 <input type="email" id="email" placeholder="Enter your email" required>
 </div>
 
 <div class="form-group">
 <label for="password">Password</label>
 <input type="password" id="password" placeholder="Enter your password" required>
 </div>
 
 <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
 </form>
 
 <div class="back-link">
 <a href="index.html">← Back to App</a>
 </div>
 </div>

 <script>
 // Firebase Configuration
 const firebaseConfig = {
 apiKey: "AIzaSyBO3Yrns0NibOzcM5EVUdQ62Std95ltZBk",
 authDomain: "starium-rafa-app.firebaseapp.com",
 projectId: "starium-rafa-app",
 storageBucket: "starium-rafa-app.firebasestorage.app",
 messagingSenderId: "743583982928",
 appId: "1:743583982928:web:e331aaa0b9e741a1537855"
 };

 // Initialize Firebase
 firebase.initializeApp(firebaseConfig);
 const auth = firebase.auth();

 // DOM Elements
 const loginForm = document.getElementById('loginForm');
 const emailInput = document.getElementById('email');
 const passwordInput = document.getElementById('password');
 const loginBtn = document.getElementById('loginBtn');
 const errorMessage = document.getElementById('errorMessage');

 // Show error message
 function showError(message) {
 errorMessage.textContent = message;
 errorMessage.style.display = 'block';
 }

 // Hide error message
 function hideError() {
 errorMessage.style.display = 'none';
 }

 // Handle form submission
 loginForm.addEventListener('submit', async (e) => {
 e.preventDefault();
 hideError();
 
 const email = emailInput.value.trim();
 const password = passwordInput.value;
 
 if (!email || !password) {
 showError('Please enter both email and password.');
 return;
 }
 
 loginBtn.disabled = true;
 loginBtn.textContent = 'Signing In...';
 
 try {
 const userCredential = await auth.signInWithEmailAndPassword(email, password);
 console.log('Login successful:', userCredential.user.email);
 // Redirect to index.html on success
 window.location.href = 'index.html';
 } catch (error) {
 loginBtn.disabled = false;
 loginBtn.textContent = 'Sign In';
 
 // Handle specific Firebase auth errors
 let errorMsg = 'An error occurred. Please try again.';
 
 switch (error.code) {
 case 'auth/invalid-email':
 errorMsg = 'Invalid email address format.';
 break;
 case 'auth/user-disabled':
 errorMsg = 'This account has been disabled.';
 break;
 case 'auth/user-not-found':
 errorMsg = 'No account found with this email.';
 break;
 case 'auth/wrong-password':
 errorMsg = 'Incorrect password. Please try again.';
 break;
 case 'auth/invalid-credential':
 errorMsg = 'Invalid email or password.';
 break;
 case 'auth/too-many-requests':
 errorMsg = 'Too many failed attempts. Please try again later.';
 break;
 case 'auth/network-request-failed':
 errorMsg = 'Network error. Please check your connection.';
 break;
 default:
 errorMsg = 'Login failed. Please check your credentials.';
 }
 
 showError(errorMsg);
 }
 });
 </script>
</body>

</html>
