<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starium Rafa Quality Control Tool</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* ===== CONFIGURABLE CONSTANTS ===== */
        :root {
            --DENSITY_TOO_LOW: 0.200;
            --DENSITY_TOO_HIGH: 0.310;
            --LEVEL9_DIVISOR: 1580;
            --BOT_DIVISOR: 1680;
            --BOT_NORMAL_MAX: 0.240;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #1E1E1E 0%, #2d2d2d 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #00BCD4;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            color: #00BCD4;
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mode-selector label {
            color: #00BCD4;
            font-weight: bold;
        }

        .mode-selector select,
        .mode-selector input[type="text"] {
            background-color: #1E1E1E;
            color: #ffffff;
            border: 2px solid #00BCD4;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            outline: none;
            transition: all 0.3s ease;
        }

        .mode-selector select { cursor: pointer; }
        .mode-selector input[type="text"] { width: 140px; }
        .mode-selector input[type="text"]::placeholder { color: #888; }

        .mode-selector select:hover,
        .mode-selector input[type="text"]:focus {
            background-color: #2d2d2d;
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
        }

        /* Special glow for Mode dropdown - important field */
        .mode-selector select#mode {
            border: 2px solid #00BCD4;
            background: linear-gradient(135deg, #1E1E1E 0%, #2d2d2d 100%);
            animation: modeGlow 2s ease-in-out infinite alternate;
        }

        @keyframes modeGlow {
            from {
                box-shadow: 0 0 5px rgba(0, 188, 212, 0.4), 0 0 10px rgba(0, 188, 212, 0.2);
            }
            to {
                box-shadow: 0 0 15px rgba(0, 188, 212, 0.7), 0 0 25px rgba(0, 188, 212, 0.4), 0 0 35px rgba(0, 188, 212, 0.2);
            }
        }

        .header-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .mode-selector select:disabled {
            background-color: #1a1a1a;
            color: #888;
            border-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        main {
            flex: 1;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .control-box {
            background-color: #1E1E1E;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            color: #00BCD4;
            font-weight: bold;
            font-size: 1rem;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            background-color: #2d2d2d;
            color: #ffffff;
            border: 2px solid #00BCD4;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.6);
            border-color: #00E676;
        }

        .input-group input::placeholder { color: #666; }

        .input-group select {
            cursor: pointer;
        }

        .grade-a { border-color: #00E676 !important; }
        .grade-u { border-color: #FF1744 !important; }

        .results-area { margin-top: 20px; }

        .save-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            flex-wrap: wrap;
        }

        .save-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #00BCD4, #0097A7);
            border: none;
            border-radius: 8px;
            color: #121212;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 188, 212, 0.4);
        }

        .save-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .save-status {
            font-size: 0.9rem;
            color: #888;
        }

        .save-status.saving { color: #FFA500; }
        .save-status.saved { color: #00E676; }
        .save-status.error { color: #F44336; }
        .save-status.offline { color: #FF5722; }

        .density-display {
            text-align: center;
            padding: 30px;
            background: linear-gradient(145deg, #1E1E1E, #252525);
            border-radius: 15px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .density-value {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            animation: sparkle 2s ease-in-out infinite;
            transition: all 0.3s ease;
        }

        .density-value.too-low,
        .density-value.too-high {
            animation: alertPulse 1s ease-in-out infinite;
            color: #FF1744;
            text-shadow: 0 0 30px rgba(255, 23, 68, 0.8);
        }

        @keyframes sparkle {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); transform: scale(1); }
            50% { text-shadow: 0 0 40px rgba(255, 255, 255, 1), 0 0 60px rgba(0, 188, 212, 0.5); transform: scale(1.02); }
        }

        @keyframes alertPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 23, 68, 0.5); transform: scale(1); }
            50% { box-shadow: 0 0 50px rgba(255, 23, 68, 1); transform: scale(1.05); }
        }

        .density-label {
            color: #888;
            margin-top: 10px;
            font-size: 1rem;
        }

        .machine-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-top: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .machine-btn {
            background: linear-gradient(145deg, #1E1E1E, #2d2d2d);
            color: #ffffff;
            border: 2px solid #00BCD4;
            padding: 12px 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
        }

        .machine-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 188, 212, 0.4);
            background: linear-gradient(145deg, #2d2d2d, #3d3d3d);
        }

        .machine-btn.selected {
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-color: #FFD700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
            color: #121212;
        }

        .machine-btn.highlighted {
            background: linear-gradient(145deg, #00E676, #00C853);
            border-color: #00E676;
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.7);
            color: #121212;
            animation: glow 1.5s ease-in-out infinite;
        }

        .machine-btn.highlighted.selected {
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-color: #FFD700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
            animation: goldGlow 1.5s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 25px rgba(0, 230, 118, 0.7); }
            50% { box-shadow: 0 0 40px rgba(0, 230, 118, 1); }
        }

        @keyframes goldGlow {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.7); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 1); }
        }

        .machine-btn.dimmed {
            opacity: 0.25;
            border-color: #444;
        }

        .machine-btn.override {
            border-color: #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .machine-btn.override::after {
            content: '⚠️';
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 0.8rem;
        }

        .bot-result {
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .bot-result.too-low,
        .bot-result.too-high {
            background: linear-gradient(145deg, #FF1744, #D50000);
            animation: alertPulse 1s ease-in-out infinite;
        }

        .bot-result.normal {
            background: linear-gradient(145deg, #00E676, #00C853);
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.5);
        }

        .bot-result .bot-label {
            color: rgba(0, 0, 0, 0.6);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            display: inline-block;
        }

        .bot-result .density-value {
            color: #121212;
            text-shadow: none;
        }

        .bot-result .status-text {
            color: #121212;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 15px;
        }

        .modal-overlay {
            position: fixed !important;
            top: 0px !important;
            left: 0px !important;
            right: 0px !important;
            bottom: 0px !important;
            width: 100vw !important;
            height: 100vh !important;
            background-color: rgba(0, 0, 0, 0.85) !important;
            z-index: 99999 !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active { opacity: 1 !important; visibility: visible !important; }

        .modal {
            background: linear-gradient(145deg, #1E1E1E, #2d2d2d);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #00BCD4;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 188, 212, 0.3);
        }

        .modal h2 {
            color: #00BCD4;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .modal-info { margin: 15px 0; text-align: left; }

        .modal-info p {
            margin: 12px 0;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-info span {
            color: #00BCD4;
            font-weight: bold;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 188, 212, 0.1);
            border-radius: 10px;
        }

        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #00BCD4;
        }

        .checkbox-container label {
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-close {
            background-color: #00BCD4;
            color: #121212;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background-color: #00E676;
            transform: scale(1.05);
        }

        .override-btn {
            background-color: #FF9800;
            color: #121212;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .override-btn:hover {
            background-color: #FFB74D;
            transform: scale(1.05);
        }

        .error-message {
            background: linear-gradient(145deg, #FF1744, #D50000);
            color: #ffffff;
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 25px;
            box-shadow: 0 8px 25px rgba(255, 23, 68, 0.4);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        footer {
            background-color: #1E1E1E;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #333;
            position: relative;
        }

        footer p { color: #666; font-size: 0.9rem; cursor: default; transition: all 0.3s ease; }
        footer:hover p { opacity: 0; }

        footer::before {
            content: "© 2026 Dammie Optimus Solutions. All rights reserved.";
            position: absolute;
            top: 20px; left: 0; right: 0;
            color: #666;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        footer:hover::before { opacity: 0; }

        footer::after {
            content: "WhatsApp Dammie Optimus Solutions on 07053331253";
            position: absolute;
            top: 20px; left: 0; right: 0;
            color: #00BCD4;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        footer:hover::after { opacity: 1; }

        .bot-hidden { display: none !important; }
        .level9-hidden { display: none !important; }

        @media (max-width: 400px) {
            .machine-grid { grid-template-columns: repeat(6, 1fr); gap: 5px; }
            .machine-btn { padding: 8px 2px; font-size: 0.7rem; }
            .input-row { flex-direction: column; }
        }
    </style>
</head>

<body>
    <header>
        <h1>Starium Rafa Quality Control Tool</h1>
        <div class="header-controls">
            <div class="mode-selector">
                <label for="mode">Mode:</label>
                <select id="mode">
                    <option value="level9">Level 9 Silo Densities</option>
                    <option value="bot">BOT Densities</option>
                </select>
            </div>

            <div class="mode-selector">
                <label for="shift">Shift:</label>
                <select id="shift" disabled>
                    <option value="DAY">DAY</option>
                    <option value="NIGHT">NIGHT</option>
                </select>
            </div>

            <div class="mode-selector">
                <label for="team">Team:</label>
                <select id="team">
                    <option value="" disabled selected>Select Team</option>
                    <option value="A">Team A</option>
                    <option value="B">Team B</option>
                    <option value="C">Team C</option>
                </select>
            </div>

            <div class="mode-selector">
                <label for="qc-name">Name:</label>
                <input type="text" id="qc-name" placeholder="Enter Name" autocomplete="off">
            </div>
        </div>
    </header>

    <main>
        <div class="control-box">
            <div class="input-row">
                <div class="input-group">
                    <label for="weight">Powder Weight (g)</label>
                    <input type="number" id="weight" placeholder="Enter powder weight in grams" step="any">
                </div>
            </div>

            <!-- BOT Mode: Appearance Dropdown -->
            <div class="input-row" id="bot-appearance-row">
                <div class="input-group">
                    <label for="bot-appearance">Appearance</label>
                    <select id="bot-appearance" class="grade-a">
                        <option value="A" selected>Acceptable</option>
                        <option value="U">Unacceptable</option>
                    </select>
                </div>
            </div>

            <!-- BOT Mode: Flow Property Dropdown -->
            <div class="input-row" id="bot-flow-row">
                <div class="input-group">
                    <label for="bot-flow">Flow Property</label>
                    <select id="bot-flow" class="grade-a">
                        <option value="FF" selected>Free Flowing</option>
                        <option value="NFF">Not Free Flowing</option>
                    </select>
                </div>
            </div>

            <!-- BOT Mode: Remarks -->
            <div class="input-group" id="bot-remarks">
                <label for="bot-remarks">Remarks</label>
                <textarea id="bot-remarks-text" placeholder="Enter additional remarks..."></textarea>
            </div>

            <div class="input-row" id="level9-row1">
                <div class="input-group">
                    <label for="buggy-number">Buggy Number</label>
                    <input type="text" id="buggy-number" placeholder="e.g., B001" autocomplete="off">
                </div>
            </div>

            <div class="input-row" id="level9-row2">
                <div class="input-group">
                    <label for="silo-machine">Silo/Machine Numbers</label>
                    <input type="text" id="silo-machine" placeholder="e.g., 1,2,3 or leave empty" autocomplete="off">
                </div>
            </div>

            <div class="input-row" id="level9-row3">
                <div class="input-group">
                    <label for="appearance">Appearance</label>
                    <select id="appearance" class="grade-a">
                        <option value="A" selected>Acceptable</option>
                        <option value="U">Unacceptable</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="fragrance">Fragrance</label>
                    <select id="fragrance" class="grade-a">
                        <option value="A" selected>Acceptable</option>
                        <option value="U">Unacceptable</option>
                    </select>
                </div>
            </div>

            <div class="input-group" id="level9-remarks">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" placeholder="Enter additional remarks..."></textarea>
            </div>
        </div>

        <div class="results-area" id="results"></div>

        <!-- Save Controls -->
        <div class="save-controls">
            <button class="save-btn" id="saveBtn" onclick="saveQCTestData()">💾 Save to Database</button>
            <div class="save-status" id="saveStatus"></div>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2>Machine Details</h2>
            <div class="modal-info">
                <p>Machine ID: <span id="modal-machine-id"></span></p>
                <p>Line: <span id="modal-line"></span></p>
                <p>Gram Setting: <span id="modal-gram"></span></p>
                <p>Density Range: <span id="modal-range"></span></p>
                <p>Carton Content: <span id="modal-carton"></span></p>
            </div>
            <div class="checkbox-container">
                <input type="checkbox" id="modal-machine-select">
                <label for="modal-machine-select">Select for powder collection</label>
            </div>
            <button class="override-btn" id="override-btn" style="display: none;">⚠️ Override & Select</button>
            <button class="modal-close" id="modal-close">Close</button>
        </div>
    </div>

    <footer><p>&nbsp;</p></footer>

    <script src="firebase-storage.js"></script>

            6: '1B', 7: '1B', 8: '1B', 9: '1B', 10: '1B',
            11: '2A', 12: '2A', 13: '2A', 14: '2A', 15: '2A',
            16: '2B', 17: '2B', 18: '2B', 19: '2B', 20: '2B',
            21: '3A', 22: '3A', 23: '3A', 24: '3A', 25: '3A',
            26: '3B', 27: '3B', 28: '3B', 29: '3B', 30: '3B'
        };

        // ===== STATE =====
        let currentDensity = null;
        let selectedMachines = new Set();
        let overrideMachines = new Set();
        let currentModalMachineId = null;

        // ===== DOM ELEMENTS =====
        const modeSelect = document.getElementById('mode');
        const shiftSelect = document.getElementById('shift');
        const teamSelect = document.getElementById('team');
        const qcNameInput = document.getElementById('qc-name');
        const weightInput = document.getElementById('weight');
        const buggyInput = document.getElementById('buggy-number');
        const siloMachineInput = document.getElementById('silo-machine');
        const appearanceSelect = document.getElementById('appearance');
        const fragranceSelect = document.getElementById('fragrance');
        const remarksTextarea = document.getElementById('remarks');
        const resultsDiv = document.getElementById('results');
        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modal-close');
        const modalMachineSelect = document.getElementById('modal-machine-select');
        const overrideBtn = document.getElementById('override-btn');

        // ===== UTILITY FUNCTIONS =====
        function getCartonContent(gram) {
            switch (gram) {
                case 22: return '162 pieces (27 strings × 6 pcs)';
                case 45: return '84 pieces (14 strings × 6 pcs)';
                case 85: return '52 pieces (8 strings × 6 pcs + 4 pcs)';
                case 125: return '31 pieces (7 strings × 4 pcs + 3 pcs)';
                case 850: return '7 pieces of detergents';
                default: return 'N/A';
            }
        }

        function isDensityTooLow(density) {
            return density < CONFIG.DENSITY_TOO_LOW;
        }

        function isDensityTooHigh(density) {
            return density > CONFIG.DENSITY_TOO_HIGH;
        }

        function isDensityOutOfRange(density) {
            return isDensityTooLow(density) || isDensityTooHigh(density);
        }

        // ===== REMARKS AUTO-FILL =====
        function updateRemarks() {
            let remarks = [];
            const isBotMode = modeSelect.value === 'bot';
            const buggy = buggyInput.value.trim();
            const siloMachines = siloMachineInput.value.trim();
            const appearance = appearanceSelect.value;
            const fragrance = fragranceSelect.value;
            
            // BOT mode elements
            const botAppearance = document.getElementById('bot-appearance');
            const botFlow = document.getElementById('bot-flow');
            const botAppearanceValue = botAppearance ? botAppearance.value : 'A';
            const botFlowValue = botFlow ? botFlow.value : 'FF';
            const botRemarksTextarea = document.getElementById('bot-remarks-text');

            // Density-related remarks
            if (currentDensity !== null) {
                if (isDensityTooLow(currentDensity)) {
                    remarks.push(`Density too LOW (${currentDensity} g/mL)`);
                } else if (isDensityTooHigh(currentDensity)) {
                    remarks.push(`Density too HIGH (${currentDensity} g/mL)`);
                }
            }

            // Override remarks
            if (overrideMachines.size > 0) {
                overrideMachines.forEach(machineId => {
                    remarks.push(`Machine ${machineId} was overridden to receive powder density of ${currentDensity} g/mL`);
                });
            }

            // Machine selection remarks
            if (selectedMachines.size > 0) {
                const machineList = Array.from(selectedMachines).sort((a, b) => a - b).join(', ');
                if (selectedMachines.size === 1) {
                    remarks.push(`Buggy ${buggy || 'N/A'} assigned to Machine ${machineList}`);
                } else {
                    remarks.push(`Buggy ${buggy || 'N/A'} shared across Machines ${machineList} for dilution`);
                }
            }

            // Appearance remarks
            if (appearance === 'U') {
                remarks.push('Appearance: Unacceptable');
            }

            // Fragrance remarks
            if (fragrance === 'U') {
                remarks.push('Fragrance: Unacceptable');
            }

            // BOT mode: Appearance remarks
            if (isBotMode && botAppearanceValue === 'U') {
                remarks.push('Appearance: Unacceptable');
            }

            // BOT mode: Flow Property remarks
            if (isBotMode && botFlowValue === 'NFF') {
                remarks.push('Flow Property: Not Free Flowing');
            }

            // Determine which textarea to use
            const targetTextarea = isBotMode ? botRemarksTextarea : remarksTextarea;
            if (!targetTextarea) return;

            // Preserve user-added content (content after auto-generated remarks)
            const currentUserContent = targetTextarea.value.split('\n').filter(line => {
                const lower = line.toLowerCase();
                return !lower.includes('density too') && 
                       !lower.includes('was overridden') &&
                       !lower.includes('assigned to machine') &&
                       !lower.includes('shared across machines') &&
                       !lower.includes('appearance:') &&
                       !lower.includes('fragrance:') &&
                       !lower.includes('flow property:');
            }).join('\n').trim();

            // Build new remarks
            let newRemarks = remarks.join('\n');
            if (currentUserContent) {
                newRemarks += '\n' + currentUserContent;
            }

            targetTextarea.value = newRemarks;
        }

        function clearAutoRemarks() {
            const isBotMode = modeSelect.value === 'bot';
            const botRemarksTextarea = document.getElementById('bot-remarks-text');
            const targetTextarea = isBotMode ? botRemarksTextarea : remarksTextarea;
            if (!targetTextarea) return;
            
            // Keep only user content
            const currentValue = targetTextarea.value;
            const userContent = currentValue.split('\n').filter(line => {
                const lower = line.toLowerCase();
                return !lower.includes('density too') && 
                       !lower.includes('was overridden') &&
                       !lower.includes('assigned to machine') &&
                       !lower.includes('shared across machines') &&
                       !lower.includes('appearance:') &&
                       !lower.includes('fragrance:') &&
                       !lower.includes('flow property:');
            }).join('\n').trim();
            targetTextarea.value = userContent;
        }

        // ===== MACHINE SELECTION =====
        function parseSiloMachineInput() {
            const value = siloMachineInput.value.trim();
            if (!value) return new Set();
            
            const numbers = value.split(',')
                .map(s => parseInt(s.trim()))
                .filter(n => !isNaN(n) && n >= 1 && n <= 30);
            return new Set(numbers);
        }

        function syncMachinesFromInput() {
            selectedMachines = parseSiloMachineInput();
            updateMachineGridSelection();
            updateRemarks();
        }

        function updateSiloMachineInput() {
            if (selectedMachines.size === 0) {
                siloMachineInput.value = '';
            } else {
                siloMachineInput.value = Array.from(selectedMachines).sort((a, b) => a - b).join(',');
            }
            updateRemarks();
        }

        function updateMachineGridSelection() {
            document.querySelectorAll('.machine-btn').forEach(btn => {
                const id = parseInt(btn.dataset.id);
                btn.classList.toggle('selected', selectedMachines.has(id));
            });
        }

        function toggleMachineSelection(machineId) {
            if (selectedMachines.has(machineId)) {
                selectedMachines.delete(machineId);
            } else {
                selectedMachines.add(machineId);
            }
            updateSiloMachineInput();
            updateMachineGridSelection();
            updateRemarks();
        }

        function addOverrideRemark(machineId) {
            overrideMachines.add(machineId);
            updateRemarks();
        }

        // ===== GRADE DROPDOWN HANDLERS =====
        function handleGradeChange(selectElement) {
            if (selectElement.value === 'U') {
                selectElement.classList.remove('grade-a');
                selectElement.classList.add('grade-u');
            } else {
                selectElement.classList.remove('grade-u');
                selectElement.classList.add('grade-a');
            }
            updateRemarks();
        }

        appearanceSelect.addEventListener('change', () => handleGradeChange(appearanceSelect));
        fragranceSelect.addEventListener('change', () => handleGradeChange(fragranceSelect));

        // BOT mode dropdowns - auto-update remarks
        const botAppearanceSelect = document.getElementById('bot-appearance');
        const botFlowSelect = document.getElementById('bot-flow');
        if (botAppearanceSelect) {
            botAppearanceSelect.addEventListener('change', updateRemarks);
        }
        if (botFlowSelect) {
            botFlowSelect.addEventListener('change', updateRemarks);
        }

        // ===== SHIFT AUTO-UPDATE =====
        function updateShift() {
            const currentHour = new Date().getHours();
            if (currentHour >= 7 && currentHour < 19) {
                shiftSelect.value = 'DAY';
            } else {
                shiftSelect.value = 'NIGHT';
            }
        }
        updateShift();
        setInterval(updateShift, 60000);

        // ===== LOCAL STORAGE =====
        const savedTeam = localStorage.getItem('qcTeam');
        if (savedTeam) teamSelect.value = savedTeam;
        const savedName = localStorage.getItem('qcName');
        if (savedName) qcNameInput.value = savedName;

        teamSelect.addEventListener('change', (e) => localStorage.setItem('qcTeam', e.target.value));
        qcNameInput.addEventListener('input', (e) => localStorage.setItem('qcName', e.target.value));

        // ===== MODAL SETUP =====
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.backgroundColor = 'rgba(0,0,0,0.85)';
        modal.style.zIndex = '99999';
        modal.style.display = 'none';
        modal.style.justifyContent = 'center';
        modal.style.alignItems = 'center';
        modal.style.opacity = '0';
        modal.style.visibility = 'hidden';

        // ===== EVENT LISTENERS =====
        weightInput.addEventListener('focus', () => {
            weightInput.value = '';
            resultsDiv.innerHTML = '';
            currentDensity = null;
            clearAutoRemarks();
        });

        // Toggle Level 9 / BOT mode elements
        function updateModeVisibility() {
            const isBotMode = modeSelect.value === 'bot';
            
            // Level 9 elements - hide in BOT mode
            const level9Row1 = document.getElementById('level9-row1');
            const level9Row2 = document.getElementById('level9-row2');
            const level9Row3 = document.getElementById('level9-row3');
            const level9Remarks = document.getElementById('level9-remarks');
            
            if (level9Row1) level9Row1.style.display = isBotMode ? 'none' : '';
            if (level9Row2) level9Row2.style.display = isBotMode ? 'none' : '';
            if (level9Row3) level9Row3.style.display = isBotMode ? 'none' : '';
            if (level9Remarks) level9Remarks.style.display = isBotMode ? 'none' : '';
            
            // BOT mode specific elements - show only in BOT mode
            const botAppearanceRow = document.getElementById('bot-appearance-row');
            const botFlowRow = document.getElementById('bot-flow-row');
            const botRemarks = document.getElementById('bot-remarks');
            
            if (botAppearanceRow) botAppearanceRow.style.display = isBotMode ? '' : 'none';
            if (botFlowRow) botFlowRow.style.display = isBotMode ? '' : 'none';
            if (botRemarks) botRemarks.style.display = isBotMode ? '' : 'none';
        }
        
        // Initialize on load
        updateModeVisibility();

        modeSelect.addEventListener('change', () => {
            weightInput.value = '';
            resultsDiv.innerHTML = '';
            currentDensity = null;
            selectedMachines.clear();
            overrideMachines.clear();
            siloMachineInput.value = '';
            updateMachineGridSelection();
            clearAutoRemarks();
            updateRemarks();
            updateModeVisibility();
        });

        weightInput.addEventListener('input', calculate);

        buggyInput.addEventListener('input', updateRemarks);

        siloMachineInput.addEventListener('input', () => {
            syncMachinesFromInput();
            updateMachineGridSelection();
        });

        siloMachineInput.addEventListener('blur', () => {
            // Validate and clean up on blur
            syncMachinesFromInput();
        });

        modalClose.addEventListener('click', () => {
            modal.style.opacity = '0';
            modal.style.visibility = 'hidden';
            setTimeout(() => { modal.style.display = 'none'; }, 300);
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.opacity = '0';
                modal.style.visibility = 'hidden';
                setTimeout(() => { modal.style.display = 'none'; }, 300);
            }
        });

        modalMachineSelect.addEventListener('change', () => {
            if (currentModalMachineId !== null) {
                if (modalMachineSelect.checked) {
                    selectedMachines.add(currentModalMachineId);
                } else {
                    selectedMachines.delete(currentModalMachineId);
                }
                updateSiloMachineInput();
                updateMachineGridSelection();
                updateRemarks();
            }
        });

        overrideBtn.addEventListener('click', () => {
            if (currentModalMachineId !== null) {
                overrideMachines.add(currentModalMachineId);
                selectedMachines.add(currentModalMachineId);
                modalMachineSelect.checked = true;
                updateSiloMachineInput();
                updateMachineGridSelection();
                updateRemarks();
                
                // Update button state
                overrideBtn.style.display = 'none';
            }
        });

        // ===== CALCULATION FUNCTIONS =====
        function calculate() {
            const weight = parseFloat(weightInput.value);
            const mode = modeSelect.value;

            if (isNaN(weight) || weight <= 0) {
                resultsDiv.innerHTML = '';
                currentDensity = null;
                clearAutoRemarks();
                return;
            }

            if (mode === 'level9') {
                calculateLevel9(weight);
            } else {
                calculateBOT(weight);
            }
            
            // Trigger auto-save after calculation
            if (currentDensity) {
                startAutoSave();
            }
        }

        function calculateLevel9(weight) {
            currentDensity = (weight / CONFIG.LEVEL9_DIVISOR).toFixed(3);
            const density = parseFloat(currentDensity);

            const matchingMachines = machineData.filter(m =>
                density >= m.min && density <= m.max
            );
            const matchingIds = matchingMachines.map(m => m.id);

            // Determine density status class
            let densityClass = '';
            if (isDensityTooLow(density)) {
                densityClass = 'too-low';
            } else if (isDensityTooHigh(density)) {
                densityClass = 'too-high';
            }

            let html = `
                <div class="density-display">
                    <div class="density-value ${densityClass}">${currentDensity}</div>
                    <div class="density-label">g/mL</div>
                </div>
                <div class="machine-grid">
            `;

            const columnOrder = [26, 21, 16, 11, 6, 1, 27, 22, 17, 12, 7, 2, 28, 23, 18, 13, 8, 3, 29, 24, 19, 14, 9, 4, 30, 25, 20, 15, 10, 5];

            columnOrder.forEach(id => {
                const isMatch = matchingIds.includes(id);
                const isSelected = selectedMachines.has(id);
                const isOverride = overrideMachines.has(id);
                
                let btnClass = 'machine-btn';
                if (isMatch && isSelected) {
                    btnClass += ' highlighted selected';
                } else if (isMatch) {
                    btnClass += ' highlighted';
                } else if (isSelected || isOverride) {
                    btnClass += ' selected override';
                } else {
                    btnClass += ' dimmed';
                }
                
                html += `<button class="${btnClass}" data-id="${id}">M${id}</button>`;
            });

            html += '</div>';

            if (matchingMachines.length === 0) {
                html += '<div class="error-message">No matching machines found for this density!</div>';
            }

            resultsDiv.innerHTML = html;
            updateRemarks();

            // Attach click handlers - ALL machines are clickable now
            document.querySelectorAll('.machine-btn').forEach(btn => {
                btn.addEventListener('click', () => showMachineModal(parseInt(btn.dataset.id), density, matchingIds.includes(parseInt(btn.dataset.id))));
            });
        }

        function calculateBOT(weight) {
            currentDensity = (weight / CONFIG.BOT_DIVISOR).toFixed(3);
            const density = parseFloat(currentDensity);

            let statusClass, statusText;
            if (density < CONFIG.DENSITY_TOO_LOW) {
                statusClass = 'too-low';
                statusText = 'TOO LOW';
            } else if (density > CONFIG.BOT_NORMAL_MAX) {
                statusClass = 'too-high';
                statusText = 'TOO HIGH';
            } else {
                statusClass = 'normal';
                statusText = 'NORMAL';
            }

            const html = `
                <div class="bot-result ${statusClass}">
                    <div class="bot-label">Base Powder Density</div>
                    <div class="density-value">${currentDensity} <span style="font-size: 1.5rem;">g/mL</span></div>
                    <div class="status-text">${statusText}</div>
                </div>
            `;

            resultsDiv.innerHTML = html;
            updateRemarks();
        }

        function showMachineModal(machineId, density, isMatching) {
            currentModalMachineId = machineId;
            const machine = machineData.find(m => m.id === machineId);
            const line = lineMap[machineId];
            const isSelected = selectedMachines.has(machineId);

            document.getElementById('modal-machine-id').textContent = `M${machineId}`;
            document.getElementById('modal-line').textContent = line;
            document.getElementById('modal-gram').textContent = `${machine.gram}g`;
            document.getElementById('modal-range').textContent = `${machine.min.toFixed(3)} - ${machine.max.toFixed(3)}`;
            document.getElementById('modal-carton').textContent = getCartonContent(machine.gram);

            modalMachineSelect.checked = isSelected;

            // Show override button only if machine is not matching (dimmed)
            if (!isMatching && !isSelected) {
                overrideBtn.style.display = 'inline-block';
            } else {
                overrideBtn.style.display = 'none';
            }

            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.backgroundColor = 'rgba(0,0,0,0.85)';
            modal.style.zIndex = '99999';
            modal.style.display = 'flex';
            modal.style.justifyContent = 'center';
            modal.style.alignItems = 'center';
            modal.style.opacity = '1';
            modal.style.visibility = 'visible';
        }

        // ===== FIREBASE SAVE FUNCTIONALITY =====
        let autoSaveTimer = null;
        let lastSavedData = null;
        const AUTO_SAVE_DELAY = 10; // seconds

        function getQCTestData() {
            const isBotMode = modeSelect.value === 'bot';
            const qcStaffInfo = getQCStaffInfo();
            
            const botAppearance = document.getElementById('bot-appearance');
            const botFlow = document.getElementById('bot-flow');
            const botRemarks = document.getElementById('bot-remarks-text');
            
            return {
                mode: modeSelect.value,
                weight: parseFloat(weightInput.value) || null,
                density: currentDensity,
                buggyNumber: buggyInput.value.trim() || null,
                siloMachine: siloMachineInput.value.trim() || null,
                appearance: isBotMode ? (botAppearance ? botAppearance.value : 'A') : appearanceSelect.value,
                fragrance: isBotMode ? null : fragranceSelect.value,
                flowProperty: isBotMode ? (botFlow ? botFlow.value : 'FF') : null,
                remarks: isBotMode ? (botRemarks ? botRemarks.value : '') : remarksTextarea.value,
                qcStaffName: qcNameInput.value.trim() || qcStaffInfo.name || null,
                qcStaffShift: shiftSelect.value || qcStaffInfo.shift,
                qcStaffTeam: teamSelect.value || qcStaffInfo.team || null,
                date: new Date().toISOString().split('T')[0]
            };
        }

        function updateSaveStatus(status, message) {
            const statusEl = document.getElementById('saveStatus');
            const saveBtn = document.getElementById('saveBtn');
            if (!statusEl) return;
            
            statusEl.className = 'save-status ' + status;
            statusEl.textContent = message;
            
            // Disable save button if no density
            if (saveBtn) {
                saveBtn.disabled = !currentDensity;
            }
        }

        async function saveQCTestData() {
            const saveBtn = document.getElementById('saveBtn');
            const statusEl = document.getElementById('saveStatus');
            
            if (!navigator.onLine) {
                updateSaveStatus('offline', '📴 Offline - Cannot save. Connect to internet.');
                return;
            }

            if (!currentDensity) {
                updateSaveStatus('error', '⚠️ No density calculated yet');
                return;
            }

            const testData = getQCTestData();
            
            // Check if data changed
            const dataString = JSON.stringify(testData);
            if (dataString === lastSavedData) {
                updateSaveStatus('saved', '✓ Already saved');
                return;
            }

            saveBtn.disabled = true;
            updateSaveStatus('saving', '⏳ Saving...');

            try {
                await saveQCTest(testData);
                lastSavedData = dataString;
                updateSaveStatus('saved', '✓ Saved successfully!');
                
                // Clear status after 3 seconds
                setTimeout(() => {
                    if (statusEl.textContent.includes('Saved')) {
                        statusEl.textContent = '';
                    }
                }, 3000);
            } catch (error) {
                console.error('Save error:', error);
                updateSaveStatus('error', '❌ Save failed: ' + error.message);
            } finally {
                saveBtn.disabled = false;
            }
        }

        function startAutoSave() {
            if (autoSaveTimer) {
                clearTimeout(autoSaveTimer);
            }
            
            if (!currentDensity || !navigator.onLine) return;
            
            let countdown = AUTO_SAVE_DELAY;
            const statusEl = document.getElementById('saveStatus');
            
            const countdownInterval = setInterval(() => {
                countdown--;
                if (countdown > 0 && statusEl) {
                    statusEl.className = 'save-status saving';
                    statusEl.textContent = `⏳ Auto-save in ${countdown}s...`;
                } else {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            autoSaveTimer = setTimeout(async () => {
                const testData = getQCTestData();
                const dataString = JSON.stringify(testData);
                
                // Only save if data changed
                if (dataString !== lastSavedData && currentDensity) {
                    try {
                        await saveQCTest(testData);
                        lastSavedData = dataString;
                        updateSaveStatus('saved', '✓ Auto-saved!');
                        
                        setTimeout(() => {
                            if (statusEl && statusEl.textContent.includes('Auto-saved')) {
                                statusEl.textContent = '';
                            }
                        }, 3000);
                    } catch (error) {
                        console.error('Auto-save error:', error);
                    }
                }
            }, AUTO_SAVE_DELAY * 1000);
        }

        // Listen for network status
        window.addEventListener('online', () => {
            updateSaveStatus('', '🟢 Online');
            setTimeout(() => {
                const statusEl = document.getElementById('saveStatus');
                if (statusEl && statusEl.textContent.includes('Online')) {
                    statusEl.textContent = '';
                }
            }, 2000);
        });

        window.addEventListener('offline', () => {
            updateSaveStatus('offline', '📴 Offline - Data will sync when online');
        });

        // Trigger auto-save when density is calculated
        const originalCalculate = calculate;
    </script>
