name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create Firebase Config File
        run: |
          echo "=== Creating firebase-config.js ==="
          cat > firebase-config.js << 'EOF'
          window.firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}"
          };
          EOF
          echo "=== firebase-config.js created ==="

      - name: Debug: List files and verify config
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Files in directory ==="
          ls -la
          echo "=== firebase-config.js contents ==="
          cat firebase-config.js
          echo "=== Checking if FIREBASE_API_KEY is set ==="
          if [ -z "${{ secrets.FIREBASE_API_KEY }}" ]; then
            echo "WARNING: FIREBASE_API_KEY is empty or not set!"
          else
            echo "FIREBASE_API_KEY is set (value hidden for security)"
          fi
          if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
            echo "WARNING: FIREBASE_PROJECT_ID is empty or not set!"
          else
            echo "FIREBASE_PROJECT_ID is set: ${{ secrets.FIREBASE_PROJECT_ID }}"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
